name: Deploy demo-inmo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: severant/demo-inmo:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /root/demo-inmo/data
            docker pull severant/demo-inmo:latest
            docker stop demo-inmo || true
            docker rm demo-inmo || true
            docker run -d \
              --name demo-inmo \
              --restart unless-stopped \
              -p 3020:3000 \
              -v /root/demo-inmo/data:/app/data \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.demo-inmo.rule=Host(\`demo-inmo.severant.cl\`)" \
              -l "traefik.http.routers.demo-inmo.tls=true" \
              -l "traefik.http.routers.demo-inmo.tls.certresolver=letsencrypt" \
              -l "traefik.http.services.demo-inmo.loadbalancer.server.port=3000" \
              --network traefik_network \
              severant/demo-inmo:latest
            docker system prune -f
